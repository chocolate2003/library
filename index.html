<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>みんなの知恵ライブラリ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background-color: #f0f9f4; font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif; }
        .card { background: white; transition: all 0.2s; border: 1px solid #e2e8f0; }
        .card:hover { transform: translateY(-2px); border-color: #86efac; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .post-checkbox { transform: scale(1.2); cursor: pointer; }
    </style>
</head>
<body class="p-4 md:p-8 text-gray-700">

    <header class="max-w-4xl mx-auto text-center mb-8">
        <h1 class="text-3xl font-bold text-green-800 mb-4">🌿 みんなの知恵ライブラリ</h1>
        
        <a href="https://opal.google/app/1jFTzeCt36PEN0S5Viudxvy9jHyrZAcsT" target="_blank" 
           class="inline-block bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-6 rounded-full shadow-lg transition mb-6">
            新しい知恵を投稿する
        </a>
        
        <div class="flex flex-col md:flex-row gap-2 justify-center items-center">
            <input type="text" id="searchInput" placeholder="本文、カテゴリ、タグで検索（スペース区切り）" 
                   class="w-full md:w-2/3 p-3 rounded-lg border-2 border-green-200 focus:outline-none focus:border-green-500 bg-white">
            <button onclick="generateImage()" class="w-full md:w-auto bg-orange-400 hover:bg-orange-500 text-white font-bold py-3 px-6 rounded-lg shadow transition">
                選択した内容を画像にする
            </button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto">
        <div id="loading" class="text-center py-10 text-green-600 font-bold">
            データを読み込み中...
        </div>
        <div id="results" class="grid gap-4"></div>
    </main>

    <div id="captureArea" class="fixed top-0 left-0 -z-10 bg-white p-10 w-[800px]" style="display:none;">
        <h2 class="text-3xl font-bold text-green-800 mb-8 border-b-2 border-green-500 pb-2">🌿 みんなの知恵ピックアップ</h2>
        <div id="captureContent"></div>
    </div>

    <script>
        // ご提示いただいたURLを設定済み
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzK1BlJB6TL_g34OtEGH--01Ria66lGLWA_TSMO8N5Oz3eFPE7hurjOyPCd2QKSVo-I/exec"; 
        let allData = [];

        async function fetchData() {
            try {
                const response = await fetch(GAS_URL);
                if (!response.ok) throw new Error('Network response was not ok');
                
                allData = await response.json();
                renderData(allData);
                document.getElementById('loading').style.display = 'none';
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('loading').innerHTML = `
                    <div class="text-red-500 p-4 bg-red-50 rounded">
                        データの読み込みに失敗しました。<br>
                        <small class="text-gray-500">GASのデプロイが「全員」に公開されているか再度ご確認ください。</small>
                    </div>`;
            }
        }

        function renderData(data) {
            const container = document.getElementById('results');
            container.innerHTML = '';

            if (data.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-500 py-10">該当するデータが見つかりませんでした。</p>';
                return;
            }

            data.forEach((item, index) => {
                // スプレッドシートの日付形式を変換
                let dateDisplay = '不明';
                if (item.timestamp) {
                    const d = new Date(item.timestamp);
                    dateDisplay = isNaN(d) ? item.timestamp : d.toLocaleDateString('ja-JP');
                }
                
                const div = document.createElement('div');
                div.className = 'card p-6 rounded-2xl shadow-sm flex gap-5 items-start';
                div.innerHTML = `
                    <input type="checkbox" class="post-checkbox mt-1 accent-green-600" data-index="${index}">
                    <div class="flex-1">
                        <div class="flex justify-between items-center mb-3">
                            <span class="text-xs font-bold text-green-700 bg-green-100 px-2.5 py-1 rounded-full">${item.category || 'なし'}</span>
                            <span class="text-xs text-gray-400 font-mono">${dateDisplay}</span>
                        </div>
                        <p class="text-gray-800 text-base leading-relaxed whitespace-pre-wrap">${item.content || '（本文なし）'}</p>
                        <div class="mt-4 flex items-center gap-1 text-green-600 font-medium">
                            <span class="text-sm">🏷</span>
                            <span class="text-sm">${item.tag || 'タグなし'}</span>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // 検索フィルター（スペース区切りのAND検索対応）
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.trim().toLowerCase();
            if (!query) {
                renderData(allData);
                return;
            }

            const keywords = query.split(/\s+/);
            const filtered = allData.filter(item => {
                const targetText = `${item.category} ${item.content} ${item.tag}`.toLowerCase();
                return keywords.every(kw => targetText.includes(kw));
            });
            renderData(filtered);
        });

        // 画像生成機能
        async function generateImage() {
            const checkboxes = document.querySelectorAll('.post-checkbox:checked');
            if (checkboxes.length === 0) {
                alert('画像に含めたい知恵にチェックを入れてください。');
                return;
            }

            const captureArea = document.getElementById('captureArea');
            const captureContent = document.getElementById('captureContent');
            captureContent.innerHTML = '';
            captureArea.style.display = 'block';

            checkboxes.forEach(cb => {
                const item = allData[cb.dataset.index];
                const d = new Date(item.timestamp);
                const dateStr = isNaN(d) ? '' : d.toLocaleDateString('ja-JP');

                const itemHtml = `
                    <div class="mb-8 p-6 border-l-8 border-green-400 bg-green-50 rounded-r-xl shadow-inner">
                        <div class="flex justify-between mb-3 text-sm font-bold">
                            <span class="text-green-700 text-base underline decoration-green-200 decoration-2 underline-offset-4">【${item.category}】</span>
                            <span class="text-gray-400 font-mono">${dateStr}</span>
                        </div>
                        <div class="text-gray-800 text-lg leading-relaxed mb-4 font-medium">${item.content}</div>
                        <div class="text-sm text-green-600 font-bold bg-white inline-block px-2 py-1 rounded border border-green-100"># ${item.tag}</div>
                    </div>
                `;
                captureContent.insertAdjacentHTML('beforeend', itemHtml);
            });

            try {
                const canvas = await html2canvas(captureArea, {
                    scale: 2, // 高画質化
                    useCORS: true,
                    backgroundColor: "#ffffff"
                });
                
                const link = document.createElement('a');
                link.download = `知恵ライブラリ_${new Date().getTime()}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
            } catch (err) {
                console.error('画像生成失敗:', err);
                alert('画像の作成中にエラーが発生しました。');
            } finally {
                captureArea.style.display = 'none';
            }
        }

        // 実行
        fetchData();
    </script>
</body>
</html>
