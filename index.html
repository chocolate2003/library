<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>みんなの知恵ライブラリ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background-color: #f0fdf4; font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; }
        .card { background: white; transition: all 0.2s; border: 1px solid #e2e8f0; }
        .card:hover { transform: translateY(-3px); border-color: #86efac; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
        .post-checkbox { transform: scale(1.5); cursor: pointer; }
    </style>
</head>
<body class="p-4 md:p-8 text-gray-700">

    <header class="max-w-4xl mx-auto text-center mb-10">
        <h1 class="text-4xl font-bold text-green-800 mb-6">🌿 みんなの知恵ライブラリ</h1>
        
        <div class="flex flex-wrap justify-center gap-4 mb-8">
            <a href="https://docs.google.com/forms/d/e/1FAIpQLSeEvWesEfwHyXcprxF4ANARzDZVdF2rpLU7_TBE7DdG7MpoZQ/viewform?usp=header" target="_blank" class="bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-8 rounded-full shadow-lg transition flex items-center gap-2 text-lg">
                <span>＋</span> 新しい知恵を投稿する
            </a>
        </div>
        
        <div class="flex flex-col md:flex-row gap-3 justify-center items-center">
            <input type="text" id="searchInput" placeholder="内容、カテゴリ、タグで検索（スペースで絞り込み）" 
                   class="w-full md:w-2/3 p-4 rounded-2xl border-2 border-green-200 focus:outline-none focus:border-green-500 bg-white shadow-sm text-lg">
            <button onclick="generateImage()" class="w-full md:w-auto bg-orange-400 hover:bg-orange-500 text-white font-bold py-4 px-8 rounded-2xl shadow-md transition">
                選択した知恵を画像にする
            </button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto">
        <div id="loading" class="text-center py-20">
            <div class="inline-block animate-spin mb-4 text-green-500 text-3xl">↻</div>
            <p class="text-green-700 font-bold text-xl">最新の知恵を同期中...</p>
        </div>
        <div id="results" class="grid gap-6"></div>
    </main>

    <div id="captureArea" class="fixed top-0 left-0 -z-10 bg-white p-12 w-[800px]" style="display:none;">
        <h2 class="text-4xl font-bold text-green-800 mb-10 border-b-4 border-green-500 pb-4">🌿 みんなの知恵セレクション</h2>
        <div id="captureContent" class="space-y-10"></div>
    </div>

    <script>
        // ★ここにデプロイした最新のGASのURL（末尾が /exec のもの）を貼り付けてください
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxTQOwtcbx6IelfSL7DXPLra_qRsjIKf-OY7_2DjrqhkjxC6dJl3LdXbc9Yw2eZfGLT/exec"; 
        let allData = [];

        // データの取得
        async function fetchData() {
            try {
                const response = await fetch(GAS_URL);
                if (!response.ok) throw new Error('通信エラー');
                allData = await response.json();
                renderData(allData);
                document.getElementById('loading').style.display = 'none';
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('loading').innerHTML = `
                    <div class="p-8 bg-white rounded-2xl border-2 border-red-100 text-red-500 shadow-sm">
                        <p class="font-bold text-lg mb-2">データの読み込みに失敗しました</p>
                        <p class="text-sm">URLの設定が正しいか、スプレッドシートの「公開」列にチェックが入ったデータがあるか確認してください。</p>
                    </div>`;
            }
        }

        // データの描画
        function renderData(data) {
            const container = document.getElementById('results');
            container.innerHTML = '';

            if (!data || data.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-20 bg-white rounded-3xl border-2 border-dashed border-green-200">
                        <p class="text-gray-400 mb-4">表示できる「承認済み」の知恵がありません。</p>
                        <p class="text-sm text-green-600 font-bold text-lg">投稿後、スプレッドシートのE列にチェックを入れると公開されます！</p>
                    </div>`;
                return;
            }

            data.forEach((item, index) => {
                let dateDisplay = '不明';
                if (item.timestamp) {
                    const d = new Date(item.timestamp);
                    dateDisplay = isNaN(d) ? item.timestamp : d.toLocaleDateString('ja-JP');
                }
                
                const div = document.createElement('div');
                div.className = 'card p-6 md:p-8 rounded-3xl flex gap-6 items-start shadow-sm';
                div.innerHTML = `
                    <input type="checkbox" class="post-checkbox mt-1.5 accent-green-600" data-index="${index}">
                    <div class="flex-1">
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-xs font-bold text-green-700 bg-green-100 px-3 py-1.5 rounded-xl border border-green-200 uppercase tracking-wider">${item.category || 'カテゴリなし'}</span>
                            <span class="text-xs text-gray-400 font-mono italic">${dateDisplay}</span>
                        </div>
                        <p class="text-gray-800 text-lg leading-relaxed whitespace-pre-wrap mb-6 font-medium">${item.content || '（本文なし）'}</p>
                        <div class="flex items-center gap-2 text-green-600 font-bold bg-green-50 inline-block px-3 py-1 rounded-lg border border-green-100">
                            <span class="text-sm">#</span>
                            <span class="text-sm">${item.tag || 'タグなし'}</span>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // 検索機能
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.trim().toLowerCase();
            if (!query) {
                renderData(allData);
                return;
            }

            const keywords = query.split(/\s+/);
            const filtered = allData.filter(item => {
                const targetText = `${item.category} ${item.content} ${item.tag}`.toLowerCase();
                return keywords.every(kw => targetText.includes(kw));
            });
            renderData(filtered);
        });

        // 画像生成機能
        async function generateImage() {
            const checkboxes = document.querySelectorAll('.post-checkbox:checked');
            if (checkboxes.length === 0) {
                alert('画像に含めたい知恵にチェックを入れてください。');
                return;
            }

            const captureArea = document.getElementById('captureArea');
            const captureContent = document.getElementById('captureContent');
            captureContent.innerHTML = '';
            captureArea.style.display = 'block';

            checkboxes.forEach(cb => {
                const item = allData[cb.dataset.index];
                const d = new Date(item.timestamp);
                const dateStr = isNaN(d) ? '' : d.toLocaleDateString('ja-JP');

                const itemHtml = `
                    <div class="p-10 border-l-[12px] border-green-400 bg-green-50 rounded-r-3xl shadow-sm">
                        <div class="flex justify-between mb-4">
                            <span class="text-green-800 text-xl font-black underline decoration-green-300 decoration-4 underline-offset-8">【${item.category}】</span>
                            <span class="text-gray-400 font-mono font-bold">${dateStr}</span>
                        </div>
                        <div class="text-gray-800 text-3xl leading-relaxed mb-6 font-medium">${item.content}</div>
                        <div class="text-lg text-green-700 font-bold bg-white inline-block px-4 py-2 rounded-xl border-2 border-green-100 shadow-sm"># ${item.tag}</div>
                    </div>
                `;
                captureContent.insertAdjacentHTML('beforeend', itemHtml);
            });

            try {
                const canvas = await html2canvas(captureArea, {
                    scale: 2,
                    useCORS: true,
                    backgroundColor: "#ffffff"
                });
                
                const link = document.createElement('a');
                link.download = `知恵ライブラリ_${new Date().getTime()}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
            } catch (err) {
                console.error('画像生成失敗:', err);
                alert('画像の作成中にエラーが発生しました。');
            } finally {
                captureArea.style.display = 'none';
            }
        }

        fetchData();
    </script>
</body>
</html>
