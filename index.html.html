<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>みんなの知恵ライブラリ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background-color: #f0f9f4; } /* 薄い緑 */
        .card { background: white; transition: transform 0.2s; }
        .card:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="p-4 md:p-8 text-gray-700">

    <header class="max-w-4xl mx-auto text-center mb-8">
        <h1 class="text-3xl font-bold text-green-800 mb-4">🌿 みんなの知恵ライブラリ</h1>
        <a href="https://opal.google/app/1jFTzeCt36PEN0S5Viudxvy9jHyrZAcsT" target="_blank" 
           class="inline-block bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-6 rounded-full shadow-lg transition mb-6">
            新しい知恵を投稿する
        </a>
        
        <div class="flex flex-col md:flex-row gap-2 justify-center items-center">
            <input type="text" id="searchInput" placeholder="タイトル、タグ、本文で検索（スペースで区切り）" 
                   class="w-full md:w-2/3 p-3 rounded-lg border-2 border-green-200 focus:outline-none focus:border-green-500">
            <button onclick="generateImage()" class="bg-orange-400 hover:bg-orange-500 text-white font-bold py-3 px-6 rounded-lg shadow transition">
                選択した内容を画像にする
            </button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto">
        <div id="loading" class="text-center py-10">データを読み込み中...</div>
        <div id="results" class="grid gap-4"></div>
    </main>

    <div id="captureArea" class="fixed top-0 left-0 -z-10 bg-white p-8 w-[800px]" style="display:none;">
        <h2 class="text-2xl font-bold text-green-800 mb-6 border-b pb-2">ピックアップした知恵</h2>
        <div id="captureContent"></div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwwNkk8S8gg0b7lBUJerRznjGkKFPKZR6yW6AyZ9sy0wlMPSCW26kjYE0TtCwXMUNMwmA/exec"; // ★ここにGASのURLを貼ってください
        let allData = [];

        // データ取得
        async function fetchData() {
            try {
                const response = await fetch(GAS_URL);
                allData = await response.json();
                renderData(allData);
                document.getElementById('loading').style.display = 'none';
            } catch (error) {
                document.getElementById('loading').innerText = 'データの読み込みに失敗しました。';
            }
        }

        // 表示処理
        function renderData(data) {
            const container = document.getElementById('results');
            container.innerHTML = '';
            data.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'card p-5 rounded-xl shadow-sm border border-green-100 flex gap-4';
                div.innerHTML = `
                    <input type="checkbox" class="w-5 h-5 mt-1 accent-green-600 post-checkbox" data-index="${index}">
                    <div class="flex-1">
                        <span class="text-xs font-bold text-green-600 bg-green-50 px-2 py-1 rounded">${item.category}</span>
                        <h3 class="text-xl font-bold mt-2 text-gray-800">${item.title}</h3>
                        <p class="text-sm text-gray-500 mt-1">🏷 ${item.tag}</p>
                        <p class="mt-3 whitespace-pre-wrap leading-relaxed">${item.content}</p>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // 検索処理
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const keywords = e.target.value.toLowerCase().split(/\s+/).filter(k => k);
            const filtered = allData.filter(item => {
                const targetText = `${item.title} ${item.category} ${item.tag} ${item.content}`.toLowerCase();
                return keywords.every(kw => targetText.includes(kw));
            });
            renderData(filtered);
        });

        // 画像生成
        async function generateImage() {
            const selectedIndices = Array.from(document.querySelectorAll('.post-checkbox:checked'))
                                         .map(cb => cb.dataset.index);
            
            if (selectedIndices.length === 0) {
                alert('画像にしたい項目をチェックしてください。');
                return;
            }

            const captureArea = document.getElementById('captureArea');
            const captureContent = document.getElementById('captureContent');
            captureContent.innerHTML = '';
            captureArea.style.display = 'block';

            selectedIndices.forEach(idx => {
                const item = allData[idx];
                const itemHtml = `
                    <div class="mb-6 p-4 border-l-4 border-green-500 bg-green-50">
                        <div class="font-bold text-lg">${item.title}</div>
                        <div class="text-sm text-green-700">#${item.tag}</div>
                        <div class="mt-2 text-gray-800">${item.content}</div>
                    </div>
                `;
                captureContent.insertAdjacentHTML('beforeend', itemHtml);
            });

            const canvas = await html2canvas(captureArea);
            const link = document.createElement('a');
            link.download = 'library-wisdom.png';
            link.href = canvas.toDataURL();
            link.click();
            
            captureArea.style.display = 'none';
        }

        fetchData();
    </script>
</body>
</html>
